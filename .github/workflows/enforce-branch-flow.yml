name: Enforce Branch Flow

on:
  pull_request:
    branches:
      - uat
      - main

jobs:
  enforce-branch-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Validate allowed source branch
        run: |
          echo "Base branch: ${{ github.base_ref }}"
          echo "Head branch: ${{ github.head_ref }}"

          if [ "${{ github.base_ref }}" = "uat" ] && [ "${{ github.head_ref }}" != "dev" ]; then
            echo "Only dev may open PRs into uat"
            exit 1
          fi

          if [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" != "uat" ]; then
            echo "Only uat may open PRs into main"
            exit 1
          fi

          echo "Branch flow check passed"
