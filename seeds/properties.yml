version: 2

seeds:
  - name: monster_core
    columns:
      - name: monster_id
        description: Unique ID value; primary key
        data_tests:
          - unique
          - not_null
      - name: monster_name
        description: Creature Name
        data_tests:
          - not_null
      - name: cr
        description: The Challenge Rating for the creature
        data_tests:
          - not_null
      - name: xp
        description: The amount of Experience Points awarded
        data_tests:
          - not_null
      - name: race
        description: The race of the creature
        data_tests:
          - not_null
      - name: class
        description: The type of creature
        data_tests:
          - not_null
      - name: level
        description: The experience of the creature
        data_tests:
          - not_null
      - name: alignment
        description: The lawful and ordered position of the creature
        data_tests:
          - not_null
      - name: size
        description: the size of the creature
        data_tests:
          - not_null
      - name: type
        description: shrug
        data_tests:
          - not_null

  - name: monster_senses
    columns:
      - name: monster_id
        description: Unique ID value; primary key
        data_tests:
          - not_null
          - unique
      - name: darkvision
        description: |
          A creature with darkvision can see in total darkness, usually to a 
          range of 60 feet. Within this range, the creature can see as clearly 
          as a sighted creature could see in an area of bright light. Darkvision 
          is black and white only but otherwise like normal sight.
        data_tests:
          - not_null
      - name: perception_mod
        description: |
          Value that raises or lowers the perception value
        data_tests:
          - not_null

  - name: monster_stats
    columns:
      - name: monster_id
        description: Unique ID value; primary key
        data_tests:
          - not_null
          - unique
      - name: str
        description: |
          Strength measures muscle and physical power. This ability is important
          for those who engage in hand-to-hand (or “melee”) combat, such as
          fighters, monks, paladins, and some rangers. Strength also sets the
          maximum amount of weight your character can carry.
          
          A character with a Strength score of 0 is too weak to move in any way
          and is unconscious. Some creatures (such as incorporeal creatures) do
          not possess a Strength score and have no modifier at all to
          Strength-based skills or checks.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              name: Check_STR_is_Numeric
              arguments:
                expression: "RLIKE '^[0-9]+$'"
      - name: dex
        description: |
          Dexterity measures agility, reflexes, and balance. This ability is the
          most important one for rogues, but it’s also useful for characters who
          wear light or medium armor or no armor at all. This ability is vital
          for characters seeking to excel with ranged weapons, such as the bow or
          sling. A character with a Dexterity score of 0 is incapable of moving
          and is effectively immobile (but not unconscious).
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              name: Check_DEX_is_Numeric
              arguments:
                expression: "RLIKE '^[0-9]+$'"
      - name: con
        description: |
          Constitution represents your character’s health and stamina. A
          Constitution bonus increases a character’s hit points, so the ability is
          important for all classes. Some creatures, such as undead and constructs,
          do not have a Constitution score. Their modifier is +0 for any 
          Constitution-based checks. A character with a Constitution score of 0 is
          dead.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              name: Check_CON_is_Numeric
              arguments:
                expression: "RLIKE '^[0-9]+$'"
      - name: int
        description: |
          Intelligence determines how well your character learns and reasons. This
          ability is important for wizards because it affects their spellcasting
          ability in many ways. Creatures of animal-level instinct have Intelligence
          scores of 1 or 2. Any creature capable of understanding speech has a score of
          at least 3. A character with an Intelligence score of 0 is comatose. Some
          creatures do not possess an Intelligence score. Their modifier is +0 for any
          Intelligence-based skills or checks. 
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              name: Check_INT_is_Numeric
              arguments:
                expression: "RLIKE '^[0-9]+$'"
      - name: wis
        description: |
          Wisdom describes a character’s willpower, common sense, awareness, and intuition.
          Wisdom is the most important ability for clerics and druids, and it is also important
          for monks and rangers. If you want your character to have acute senses, put a high
          score in Wisdom. Every creature has a Wisdom score. A character with a Wisdom score of
          0 is incapable of rational thought and is unconscious.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              name: Check_WIS_is_Numeric
              arguments:
                expression: "RLIKE '^[0-9]+$'"
      - name: cha
        description: |
          Charisma measures a character’s personality, personal magnetism, ability to lead, and
          appearance. It is the most important ability for paladins, sorcerers, and bards. It is
          also important for clerics, since it affects their ability to channel energy. For undead
          creatures, Charisma is a measure of their unnatural “lifeforce.” Every creature has a
          Charisma score. A character with a Charisma score of 0 is not able to exert himself in any
          way and is unconscious.
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              name: Check_CHA_is_Numeric
              arguments:
                expression: "RLIKE '^[0-9]+$'"

  - name: monster_feats
    columns:
      - name: monster_id
        data_tests:
          - not_null
          - unique
      - name: improved_initiative
        description: |
          Your quick reflexes allow you to react rapidly to danger.
          Benefit: You get a +4 bonus on initiative checks.
        data_tests:
          - not_null
